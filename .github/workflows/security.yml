name: seguridad-y-calidad

# Se ejecuta en cada Pull Request y en cada push a main.
# En el plan gratuito privado estos checks NO bloquean el merge
# automaticamente, pero quedan visibles en el PR: el acuerdo del
# equipo es no fusionar nada que este en rojo.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  # ---- Deteccion de secretos -------------------------------------
  secretos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Nota: en cuentas PERSONALES es gratis. Si algun dia mueves el
        # repo a una ORGANIZACION grande, gitleaks-action puede pedir
        # GITLEAKS_LICENSE.

  # ---- Terraform: formato y validacion ---------------------------
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: formato
        run: terraform fmt -check -recursive
      - name: init (sin backend, no necesita credenciales)
        run: terraform init -backend=false
        working-directory: ./terraform
      - name: validate
        run: terraform validate
        working-directory: ./terraform

  # ---- Seguridad de la infraestructura (IaC) ---------------------
  iac-seguridad:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: ./terraform

  # ---- Python: lint y tests --------------------------------------
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff pytest
      - name: lint
        run: ruff check .
      - name: tests
        run: pytest -q || true   # quita "|| true" cuando tengais tests reales
