name: seguridad-y-calidad

# Se ejecuta en cada Pull Request y en cada push a main.
# En el plan gratuito privado estos checks NO bloquean el merge
# automaticamente, pero quedan visibles en el PR: el acuerdo del
# equipo es no fusionar nada que este en rojo.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # ---- Deteccion de secretos -------------------------------------
  secretos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        # Nota: en cuentas PERSONALES es gratis. Si algun dia mueves el
        # repo a una ORGANIZACION grande, gitleaks-action puede pedir
        # GITLEAKS_LICENSE.

  # ---- Terraform: formato y validacion ---------------------------
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: formato
        run: terraform fmt -check -recursive
      - name: init (sin backend, no necesita credenciales)
        run: terraform init -backend=false
        working-directory: ./terraform
      - name: validate
        run: terraform validate
        working-directory: ./terraform

  # ---- Seguridad de la infraestructura (IaC) ---------------------
  iac-seguridad:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: ./terraform

  # ---- Python: lint y tests --------------------------------------
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # pandas/numpy hacen falta para que pytest pueda IMPORTAR los modulos
      # de test durante la fase de coleccion sin romperse.
      - run: pip install ruff pytest pandas numpy
      - name: lint
        run: ruff check .
      - name: tests
        # pytest devuelve codigo 5 cuando NO hay tests que recoger (hoy no hay
        # tests unitarios reales, solo scripts de validacion). Toleramos ese
        # caso concreto, pero un fallo de test real (codigo 1) SI rompe el CI.
        run: |
          set +e
          pytest -q
          code=$?
          set -e
          if [ $code -eq 5 ]; then
            echo "No hay tests que recoger; se considera OK."
            exit 0
          fi
          exit $code
