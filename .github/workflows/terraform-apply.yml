name: terraform-apply

# Al mergear a main cambios de infra (terraform/**), aplica Terraform contra el
# estado remoto. GATEADO por el Environment "production" (aprobacion manual).
#
# ⚠️ NO habilitar el auto-apply hasta haber reconciliado el DRIFT: buckets,
# service accounts, dataset de BigQuery y el Job "preprocess" se crearon fuera
# de esta raiz Terraform. Un apply sobre estado no reconciliado dara conflictos
# 409 o propondra destrucciones. Ver SETUP.md (seccion "Reconciliacion de drift").

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-apply.yml"

permissions:
  contents: read
  id-token: write # token OIDC para WIF

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: production # requiere aprobacion manual configurada en GitHub
    defaults:
      run:
        working-directory: ./terraform
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SA_EMAIL }}
      - uses: hashicorp/setup-terraform@v3

      - name: Init
        run: terraform init -input=false

      - name: Apply
        run: terraform apply -input=false -auto-approve -var="project_id=${PROJECT_ID}"
