name: deploy-services

# CD de los microservicios: al mergear a main, construye y publica en Artifact
# Registry SOLO las imagenes de los servicios que cambiaron y actualiza su
# recurso de Cloud Run. Autenticacion sin claves via Workload Identity
# Federation (ver terraform/cicd.tf y SETUP.md).

on:
  push:
    branches: [main]
    paths:
      - "dash/**"
      - "monitoring/**"
      - "preprocess/**"
      - ".github/workflows/deploy-services.yml"

permissions:
  contents: read
  id-token: write # necesario para el token OIDC de WIF

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}

jobs:
  # 1) Detecta que servicios cambiaron y construye la matriz dinamica.
  changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      any: ${{ steps.set.outputs.any }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            dash:
              - 'dash/**'
            monitoring:
              - 'monitoring/**'
            preprocess:
              - 'preprocess/**'
      - id: set
        run: |
          items=()
          [ "${{ steps.filter.outputs.dash }}" = "true" ] && \
            items+=('{"name":"dash","repo":"dash-repo","image":"dash-app","kind":"service","target":"dash"}')
          [ "${{ steps.filter.outputs.monitoring }}" = "true" ] && \
            items+=('{"name":"monitoring","repo":"monitoring-repo","image":"monitoring-app","kind":"service","target":"monitoring"}')
          [ "${{ steps.filter.outputs.preprocess }}" = "true" ] && \
            items+=('{"name":"preprocess","repo":"preprocess-repo","image":"preprocess-pipeline","kind":"job","target":"preprocess"}')
          if [ ${#items[@]} -gt 0 ]; then
            json=$(IFS=,; echo "${items[*]}")
            echo "any=true" >> "$GITHUB_OUTPUT"
          else
            json=""
            echo "any=false" >> "$GITHUB_OUTPUT"
          fi
          echo "matrix={\"include\":[$json]}" >> "$GITHUB_OUTPUT"

  # 2) Construye y publica la imagen de cada servicio cambiado.
  build-push:
    needs: changes
    if: needs.changes.outputs.any == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(needs.changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SA_EMAIL }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Configurar Docker para Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet
      - name: Build y push (tags :sha y :latest)
        run: |
          IMG="${REGION}-docker.pkg.dev/${PROJECT_ID}/${{ matrix.repo }}/${{ matrix.image }}"
          docker build -f "${{ matrix.name }}/dockerfile" \
            -t "$IMG:${GITHUB_SHA}" -t "$IMG:latest" "${{ matrix.name }}"
          docker push "$IMG:${GITHUB_SHA}"
          docker push "$IMG:latest"

  # 3) Despliega la imagen recien publicada en Cloud Run.
  #    Gateado por el Environment "production" (aprobacion manual en GitHub).
  deploy:
    needs: [changes, build-push]
    if: needs.changes.outputs.any == 'true'
    runs-on: ubuntu-latest
    environment: production
    strategy:
      matrix: ${{ fromJSON(needs.changes.outputs.matrix) }}
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SA_EMAIL }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Actualizar Cloud Run (service o job)
        run: |
          IMG="${REGION}-docker.pkg.dev/${PROJECT_ID}/${{ matrix.repo }}/${{ matrix.image }}:${GITHUB_SHA}"
          if [ "${{ matrix.kind }}" = "service" ]; then
            gcloud run services update "${{ matrix.target }}" \
              --image "$IMG" --region "$REGION" --project "$PROJECT_ID"
          else
            gcloud run jobs update "${{ matrix.target }}" \
              --image "$IMG" --region "$REGION" --project "$PROJECT_ID"
          fi
