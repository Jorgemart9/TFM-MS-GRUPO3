name: Continuous Integration & Deployment (GCP MLOps)

on:
  push:
    branches:
      - main
      - despliegue-modelos

env:
  PROJECT_ID: "tfm-ms-3"
  REGION: "europe-west1"
  WIF_PROVIDER: 'projects/1076362823794/locations/global/workloadIdentityPools/github-wif-pool/providers/github-provider'
  WIF_SERVICE_ACCOUNT: 'sa-github-deployer-v2@tfm-ms-3.iam.gserviceaccount.com'
  VERTEX_SA: 'sa-vertex-train@tfm-ms-3.iam.gserviceaccount.com'
  GCS_BUCKET: 'models-artifacts-tfm'
  
jobs:
  deploy-mlops:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # ==========================================
    # FASE AUTENTICACIÓN
    # ==========================================
    - name: Google Auth
      id: auth
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ env.WIF_PROVIDER }}
        service_account: ${{ env.WIF_SERVICE_ACCOUNT }}
        token_format: 'access_token'

    - name: Login to Artifact Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGION }}-docker.pkg.dev
        username: oauth2accesstoken
        password: ${{ steps.auth.outputs.access_token }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    # ==========================================
    # FASE A: COMPILAR Y SUBIR IMÁGENES DOCKER
    # ==========================================
    - name: Build and Push Preprocess Image
      run: |
        docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/preprocess-repo/preprocess-pipeline:latest ./preprocess
        docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/preprocess-repo/preprocess-pipeline:latest

    - name: Build and Push Dash Image
      run: |
        docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/dash-repo/dash-pipeline:latest ./dash
        docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/dash-repo/dash-pipeline:latest

    - name: Build and Push Monitoring Image
      run: |
        docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/monitoring-repo/monitoring-pipeline:latest ./monitoring
        docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/monitoring-repo/monitoring-pipeline:latest
    
    - name: Build and Push Training Image
      run: |
        docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/training-repo/training-pipeline:latest ./entrenamiento
        docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/training-repo/training-pipeline:latest

    - name: Build and Push Export Metrics Image
      run: |
        docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/training-repo/export-metrics:latest ./validacion
        docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/training-repo/export-metrics:latest

    # ==========================================
    # FASE B: ACTUALIZAR Y DESPLEGAR EN CLOUD RUN
    # ==========================================
    - name: Update Preprocess Job
      run: |
        gcloud run jobs update preprocess \
          --image=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/preprocess-repo/preprocess-pipeline:latest \
          --region=${{ env.REGION }}

    # ==========================================
    # FASE C: ENTRENAMIENTO AUTOMÁTICO EN VERTEX AI
    # ==========================================
    - name: Submit Model Training Job to Vertex AI
      id: vertex_job
      run: |
        echo "[*] Enviando trabajo a Vertex AI..."
        
        # 1. Ejecutamos el comando y guardamos TODA la salida en un archivo temporal
        gcloud ai custom-jobs create \
          --region=${{ env.REGION }} \
          --display-name="credit-risk-training-pipeline" \
          --service-account=${{ env.VERTEX_SA }} \
          --worker-pool-spec="machine-type=n1-standard-4,container-image-uri=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/training-repo/training-pipeline:latest" \
          --args="--data-source=bigquery,--data-path=${{ env.PROJECT_ID }}.analytics_warehouse.df_completo_cr_clean_v2,--gcp-project=${{ env.PROJECT_ID }},--gcs-bucket=${{ env.GCS_BUCKET }},--gcp-location=${{ env.REGION }}" > job_output.txt 2>&1
        
        # Mostramos la salida en el log de GitHub Actions para que puedas verla
        cat job_output.txt
        
        # 2. Extraemos el ID buscando de forma más limpia la palabra 'customJobs/'
        JOB_ID=$(grep -oP "projects/${{ env.PROJECT_ID }}/locations/${{ env.REGION }}/customJobs/\d+" job_output.txt || true)
        
        # Si por alguna razón la búsqueda anterior falló, usamos una alternativa basada en texto
        if [ -z "$JOB_ID" ]; then
          JOB_ID=$(grep -o "projects/.*customJobs/[0-9]*" job_output.txt | head -n 1)
        fi
        
        # 3. Guardamos la variable en el entorno de GitHub Actions
        echo "JOB_ID=$JOB_ID" >> $GITHUB_OUTPUT
        echo "[*] ID del Job extraído con éxito: $JOB_ID"

    # ==========================================
    # FASE D: EVALUACIÓN Y EXPORTACIÓN DE MÉTRICAS (CLOUD BUILD)
    # ==========================================
    - name: Trigger Cloud Build
      run: |
        echo "[*] Generando configuración temporal de Cloud Build..."

        cat > cloudbuild-export.yaml <<EOF
        steps:
          - name: "${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/training-repo/export-metrics:latest"
            # Forzamos a Cloud Build a posicionarse dentro de /app en el contenedor
            dir: "/app"
            args:
              - "--gcp-project=${{ env.PROJECT_ID }}"
              - "--gcp-location=${{ env.REGION }}"
              - "--experiment-name=credit-risk-mvp"

        options:
          logging: CLOUD_LOGGING_ONLY
        EOF

        echo "[*] Lanzando Cloud Build..."

        gcloud builds submit \
          --no-source \
          --region=${{ env.REGION }} \
          --config=cloudbuild-export.yaml \
          --service-account="projects/${{ env.PROJECT_ID }}/serviceAccounts/sa-cloudbuild-evaluator@${{ env.PROJECT_ID }}.iam.gserviceaccount.com"

        echo "[*] Cloud Build lanzada correctamente."


    # ==========================================
    # FASE F: REGISTRO Y DESPLIEGUE DEL MODELO (OPERACIONES MLOPS)
    # ==========================================
    - name: Register Model in Vertex AI Registry
      run: |
        echo "[*] Registrando el modelo entrenado en Vertex AI..."
        gcloud ai models upload \
          --region=${{ env.REGION }} \
          --display-name="credit_risk_model" \
          --artifact-uri="gs://${{ env.GCS_BUCKET }}/credit_risk_model/v1" \
          --container-image-uri="gcr.io/cloud-aiplatform/prediction/tf2-cpu.2-8:latest"

    - name: Deploy Model to Vertex AI Endpoint
      run: |
        echo "[*] Desplegando el modelo en el endpoint creado por Terraform..."
        
        # Usamos el nombre del endpoint que definiste en Terraform
        gcloud ai endpoints deploy-model "credit-risk-endpoint" \
          --region=${{ env.REGION }} \
          --model="credit_risk_model" \
          --display-name="credit_risk_deployed_v1" \
          --machine-type="n1-standard-2" \
          --traffic-split="0=100"
