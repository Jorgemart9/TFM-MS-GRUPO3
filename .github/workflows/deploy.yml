name: Continuous Integration & Deployment (GCP MLOps)

on:
  push:
    branches:
      - main
      - despliegue-modelos

env:
  PROJECT_ID: "tfm-ms-3"
  REGION: "europe-west1"
  WIF_PROVIDER: "projects/1076362823794/locations/global/workloadIdentityPools/github/providers/github-provider"
  WIF_SERVICE_ACCOUNT: "sa-github-deployer@tfm-ms-3.iam.gserviceaccount.com"

jobs:
  deploy-mlops:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. Autenticación automática y segura en Google Cloud sin contraseñas
    - name: Google Auth
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ env.WIF_PROVIDER }}
        service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    # 2. Configurar Docker para que pueda loguearse en Artifact Registry
    - name: Configure Docker for GCP
      run: |
        gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

    # ==========================================
    # FASE A: COMPILAR Y SUBIR IMÁGENES DOCKER
    # ==========================================
    - name: Build and Push Preprocess Image
      run: |
        docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/preprocess-repo/preprocess-pipeline:latest ./src/preprocess
        docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/preprocess-repo/preprocess-pipeline:latest

    - name: Build and Push Dash Image
      run: |
        docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/dash-repo/dash-app:latest ./src/dash
        docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/dash-repo/dash-app:latest

    - name: Build and Push Monitoring Image
      run: |
        docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/monitoring-repo/monitoring-app:latest ./src/monitoring
        docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/monitoring-repo/monitoring-app:latest

    # ==========================================
    # FASE B: ACTUALIZAR Y DESPLEGAR EN CLOUD RUN
    # ==========================================
    - name: Deploy Cloud Run Job (Preprocess)
      run: |
        gcloud run jobs update preprocess \
          --image=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/preprocess-repo/preprocess-pipeline:latest \
          --region=${{ env.REGION }}

    - name: Deploy Cloud Run Service (Dash)
      run: |
        gcloud run services update dash \
          --image=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/dash-repo/dash-app:latest \
          --region=${{ env.REGION }}

    - name: Deploy Cloud Run Service (Monitoring)
      run: |
        gcloud run services update monitoring \
          --image=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/monitoring-repo/monitoring-app:latest \
          --region=${{ env.REGION }}

    # ==========================================
    # FASE C: DISPARAR EJECUCIÓN AUTOMÁTICA
    # ==========================================
    - name: Execute Preprocess Job Automatically
      run: |
        echo "[*] Disparando la ejecución del Job de preprocesamiento en Cloud Run..."
        gcloud run jobs execute preprocess \
          --region=${{ env.REGION }} \
          --async