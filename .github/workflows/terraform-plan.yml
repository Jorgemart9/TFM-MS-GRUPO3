name: terraform-plan

# En cada PR que toque la infra (terraform/**), ejecuta `terraform plan` contra
# el estado remoto y publica el resultado como comentario en el PR, para poder
# revisar los cambios ANTES de mergear. Solo lectura (no aplica nada).

on:
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-plan.yml"

permissions:
  contents: read
  id-token: write # token OIDC para WIF
  pull-requests: write # comentar el plan en el PR

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}

jobs:
  plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SA_EMAIL }}
      - uses: hashicorp/setup-terraform@v3

      - name: Init
        run: terraform init -input=false

      - name: Plan
        id: plan
        run: |
          set +e
          terraform plan -input=false -no-color -var="project_id=${PROJECT_ID}" -out=tfplan 2>&1 | tee plan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Comentar el plan en el PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let plan = fs.readFileSync('terraform/plan.txt', 'utf8');
            const max = 60000;
            if (plan.length > max) plan = plan.slice(0, max) + '\n... (truncado)';
            const body = `#### terraform plan 📖\n<details><summary>Ver plan</summary>\n\n\`\`\`\n${plan}\n\`\`\`\n</details>`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fallar si el plan dio error
        if: steps.plan.outputs.exitcode != '0'
        run: exit 1
