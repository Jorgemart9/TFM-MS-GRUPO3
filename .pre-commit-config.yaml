# Hooks que se ejecutan en tu maquina ANTES de cada commit.
# Bloquean el commit si detectan un secreto, una clave privada,
# un fichero enorme, etc. Es la primera barrera de seguridad.
#
# Instalacion (una vez por persona):
#   pip install pre-commit
#   pre-commit install
#
# Para actualizar versiones de los hooks:
#   pre-commit autoupdate

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: detect-private-key          # detecta claves privadas SSH/PEM
      - id: check-added-large-files
        args: ["--maxkb=5000"]          # bloquea ficheros > 5 MB

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks                    # detector de secretos (API keys, tokens...)

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.107.0
    hooks:
      - id: terraform_fmt
      - id: terraform_validate

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.18
    hooks:
      - id: ruff                        # linter de Python
      - id: ruff-format                 # formateo de Python
